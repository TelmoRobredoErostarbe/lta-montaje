<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Montaje" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>LTA Montaje</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #ffffff; }

      #splash {
        position: fixed;
        inset: 0;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        z-index: 9999;
        transition: opacity 0.35s ease;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash img {
        width: 180px;
        height: auto;
        object-fit: contain;
      }
      #splash-bar {
        width: 120px;
        height: 3px;
        background: #e2e8f0;
        border-radius: 99px;
        overflow: hidden;
      }
      #splash-fill {
        height: 100%;
        width: 0%;
        background: #0f172a;
        border-radius: 99px;
        animation: fill 1.4s ease-in-out forwards;
      }
      @keyframes fill {
        0%   { width: 0%; }
        40%  { width: 60%; }
        70%  { width: 80%; }
        100% { width: 95%; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/lasttour-logo.png" alt="Last Tour América" />
      <div id="splash-bar"><div id="splash-fill"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
