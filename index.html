<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Montaje" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>LTA Montaje</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #ffffff; }

      #splash {
        position: fixed;
        inset: 0;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .splash-logo-wrap {
        position: relative;
        width: 200px;
        height: auto;
      }

      /* Ghost: logo muy tenue como contorno */
      .splash-logo-ghost {
        width: 200px;
        display: block;
        opacity: 0.1;
      }

      /* Fill: mismo logo encima, se revela de abajo a arriba */
      .splash-logo-fill {
        position: absolute;
        top: 0;
        left: 0;
        width: 200px;
        display: block;
        clip-path: inset(100% 0 0 0);
        animation: logo-fill 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        animation-delay: 0.15s;
      }

      @keyframes logo-fill {
        0%   { clip-path: inset(100% 0 0 0); }
        100% { clip-path: inset(0%   0 0 0); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-logo-wrap">
        <img class="splash-logo-ghost" src="/lasttour-logo.png" alt="" />
        <img class="splash-logo-fill"  src="/lasttour-logo.png" alt="Last Tour América" />
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
